<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Trading Analysis Dashboard v12</title>
    <link rel="icon" href="fav-3.png" type="image/x-icon">
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Sarabun', sans-serif; margin: 20px; background-color: #f8f9fa; }
        .container { max-width: 1300px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; margin-bottom: 20px; padding-bottom: 10px; }
        .upload-section { background: #f1f3f5; padding: 20px; border: 2px dashed #ced4da; border-radius: 8px; text-align: center; margin-bottom: 20px; }
        #chart { width: 100%; height: 850px; }
        .status { color: #666; font-size: 0.9em; margin-top: 10px; }
        
        .btn-group { display: flex; gap: 10px; justify-content: center; margin-bottom: 15px; flex-wrap: wrap; }
        .btn-group button {
            padding: 8px 16px; border: 1px solid #00B0F0; background: white; color: #00B0F0;
            border-radius: 6px; cursor: pointer; font-family: 'Sarabun', sans-serif; font-weight: bold; transition: 0.2s;
        }
        .btn-group button:hover { background: #00B0F0; color: white; }
        .btn-group button.active { background: #00B0F0; color: white; border-color: #00B0F0; }

        .y-control-panel {
            position: absolute; right: 60px; display: none; gap: 5px; align-items: center;
            background: rgba(255, 255, 255, 0.95); padding: 4px 12px; border-radius: 6px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15); font-size: 0.85em; z-index: 10; border: 1px solid #e9ecef;
        }
        .y-control-panel input { width: 70px; padding: 3px 6px; border: 1px solid #ced4da; border-radius: 4px; text-align: center; }
        .y-control-panel .reset-y { padding: 3px 10px; border: none; background: #fa5252; color: white; border-radius: 4px; cursor: pointer; font-weight: bold; }

        .table-section { margin-top: 40px; display: none; }
        .data-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; background: white; }
        .data-table th { background: #00B0F0; color: white; padding: 12px; border: 1px solid #dee2e6; text-align: center; }
        .data-table td { padding: 10px; border: 1px solid #dee2e6; text-align: center; font-weight: 500; }
        .data-table tr:nth-child(even) { background-color: #f8f9fa; }
        
        .txt-green { color: #00B050 !important; font-weight: bold; }
        .txt-red { color: #FF0000 !important; font-weight: bold; }

        .save-section { text-align: center; margin: 30px 0; }
        .btn-save { padding: 12px 30px; background: #28a745; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1.1em; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-save:hover { background: #218838; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>📊 ระบบวิเคราะห์กราฟและตารางข้อมูล (v12)</h2>
    </div>
    
    <div class="upload-section">
        <label for="fileInput"><b>เลือกไฟล์ Excel หรือ CSV:</b></label><br><br>
        <input type="file" id="fileInput" accept=".xlsx, .xls, .csv" />
        <div id="status" class="status">รอการอัปโหลดไฟล์...</div>
    </div>

    <div class="btn-group" id="rangeButtons" style="display: none;">
        <button onclick="setZoom('1d', this)">1 วัน</button>
        <button onclick="setZoom('1w', this)">1 สัปดาห์</button>
        <button onclick="setZoom('4w', this)">4 สัปดาห์</button>
        <button onclick="setZoom('3m', this)">3 เดือน</button>
        <button onclick="setZoom('6m', this)">6 เดือน</button>
        <button onclick="setZoom('1y', this)">1 ปี</button>
        <button onclick="setZoom('75c', this)">75 แท่งเทียน</button>
        <button onclick="setZoom('all', this)" class="active">ทั้งหมด</button>
    </div>

    <div id="chart-container" style="position: relative;">
        <div id="chart"></div>
        <div class="y-control-panel" id="ctrl-price" style="top: 15px;">
            <span>📈 ราคา:</span>
            <input type="number" id="y1-min" placeholder="Min" oninput="applyY('yaxis', 'y1-min', 'y1-max')">
            <input type="number" id="y1-max" placeholder="Max" oninput="applyY('yaxis', 'y1-min', 'y1-max')">
            <button class="reset-y" onclick="resetY('yaxis', 'y1-min', 'y1-max')">Reset</button>
        </div>
        <div class="y-control-panel" id="ctrl-candle" style="top: 315px;">
            <span>📊 Candle Size:</span>
            <input type="number" id="y3-min" placeholder="Min" oninput="applyY('yaxis3', 'y3-min', 'y3-max')">
            <input type="number" id="y3-max" placeholder="Max" oninput="applyY('yaxis3', 'y3-min', 'y3-max')">
            <button class="reset-y" onclick="resetY('yaxis3', 'y3-min', 'y3-max')">Reset</button>
        </div>
        <div class="y-control-panel" id="ctrl-ma" style="top: 465px;">
            <span>เส้น MA:</span>
            <input type="number" id="y4-min" placeholder="Min" oninput="applyY('yaxis4', 'y4-min', 'y4-max')">
            <input type="number" id="y4-max" placeholder="Max" oninput="applyY('yaxis4', 'y4-min', 'y4-max')">
            <button class="reset-y" onclick="resetY('yaxis4', 'y4-min', 'y4-max')">Reset</button>
        </div>
        <div class="y-control-panel" id="ctrl-wick" style="top: 615px;">
            <span>% Wick:</span>
            <input type="number" id="y5-min" placeholder="Min" oninput="applyY('yaxis5', 'y5-min', 'y5-max')">
            <input type="number" id="y5-max" placeholder="Max" oninput="applyY('yaxis5', 'y5-min', 'y5-max')">
            <button class="reset-y" onclick="resetY('yaxis5', 'y5-min', 'y5-max')">Reset</button>
        </div>
    </div>

    <div class="table-section" id="tableSection">
        <hr>
        <h3>📋 สรุปข้อมูล 20 อันดับล่าสุด</h3>
        <table class="data-table">
            <thead>
                <tr>
                    <th>No. (ลำดับ)</th>
                    <th>Close</th>
                    <th>Volume</th>
                    <th>Candle Size</th>
                    <th>% Wick</th>
                    <th>MA7</th>
                    <th>MA14</th>
                    <th>MA21</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
        
        <div class="save-section">
            <button class="btn-save" onclick="saveAsHTML()">💾 Save HTML Snapshot</button>
        </div>
    </div>
</div>

<script>
    let globalXData = []; 
    let globalRawDates = []; // เก็บวันที่ดิบสำหรับระบบคำนวณการซูม

    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
            const jsonData = XLSX.utils.sheet_to_json(firstSheet);
            if (jsonData.length > 0) {
                renderChart(jsonData);
                renderSummaryTable(jsonData);
                document.getElementById('status').innerText = "โหลดข้อมูลสำเร็จ: " + jsonData.length + " แถว";
            }
        };
        reader.readAsArrayBuffer(file);
    });

    function renderChart(rawData) {
        const data = [...rawData].reverse(); 
        const x = [], open = [], high = [], low = [], close = [], vol = [];
        const cs_y = [], cs_colors = [], ma7 = [], ma14 = [], ma21 = [], ma50 = [], wick_y = [], wick_colors = [];
        const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

        globalRawDates = []; // Reset ข้อมูลเก่า

        data.forEach(row => {
            let dateStr = String(row.Date).replace(/(\d{4})(\d{2})(\d{2})/, "$1-$2-$3");
            let rawTime = row.Time || '00:00:00';
            let rawDateTime = dateStr + ' ' + rawTime;
            
            globalRawDates.push(rawDateTime); // เก็บ Date ดิบไว้ใช้คำนวณการกดปุ่ม

            // แปลงรูปแบบ Date ให้สวยงามเป็น mmm dd / am/pm
            let dObj = new Date(rawDateTime.replace(' ', 'T'));
            let mmm = months[dObj.getMonth()];
            let dd = dObj.getDate();
            let h = dObj.getHours();
            let m = String(dObj.getMinutes()).padStart(2, '0');
            let ampm = h >= 12 ? 'PM' : 'AM';
            h = h % 12 || 12; // แปลงเลข 0 เป็น 12
            
            let formattedDisplay = `${mmm} ${dd}<br>${h}:${m}${ampm}`; // ขึ้นบรรทัดใหม่เพื่อให้สวยงามบนแกน X
            x.push(formattedDisplay);

            open.push(row.Open); high.push(row.High); low.push(row.Low); close.push(row.Close); vol.push(row.Volume);
            let cs = parseFloat(row['Candle Size'] || 0);
            cs_y.push(cs);
            cs_colors.push(cs > 0 ? '#00B050' : (cs < 0 ? '#FF0000' : '#adb5bd'));
            ma7.push(row.MA7 || null); ma14.push(row.MA14 || null); ma21.push(row.MA21 || null); ma50.push(row.MA50 || null);
            let pw = parseFloat(String(row['% Wick'] || '0').replace('%', ''));
            let wSide = row['Wick Side'];
            if (wSide === 'Top') { wick_y.push(pw); wick_colors.push('#00B050'); }
            else if (wSide === 'Bottom') { wick_y.push(-pw); wick_colors.push('#FF0000'); }
            else { wick_y.push(0); wick_colors.push('#adb5bd'); }
        });

        globalXData = x;
        const layout = {
            dragmode: 'zoom', hovermode: 'x unified', showlegend: true, legend: { orientation: 'h', y: 1.05 },
            xaxis: { 
                rangeslider: { visible: false },
                type: 'category', 
                nticks: 10 // จำกัดการโชว์ป้ายกำกับให้ไม่แสดงทุกแท่ง (โชว์แค่วันหลักๆ ให้สะอาดตา)
            },
            yaxis1: { title: 'ราคา', domain: [0.65, 1] },
            yaxis2: { title: 'Volume', overlaying: 'y1', side: 'right', showgrid: false },
            yaxis3: { title: 'Candle Size', domain: [0.45, 0.60], zeroline: true },
            yaxis4: { title: 'MA Ribbon', domain: [0.25, 0.40] },
            yaxis5: { title: '% Wick (%)', domain: [0, 0.20], zeroline: true, range: [-100, 100] },
            template: 'plotly_white', margin: { t: 50, b: 50, l: 60, r: 60 }
        };

        Plotly.newPlot('chart', [
            { x: x, open: open, high: high, low: low, close: close, type: 'candlestick', name: 'Price', yaxis: 'y1' },
            { x: x, y: vol, type: 'bar', name: 'Volume', marker: {color: '#ced4da', opacity: 0.3}, yaxis: 'y2' },
            { x: x, y: cs_y, type: 'bar', name: 'Candle Size', marker: {color: cs_colors}, yaxis: 'y3' },
            { x: x, y: ma7, name: 'MA7', line: {color: '#00B0F0'}, yaxis: 'y4' },
            { x: x, y: ma14, name: 'MA14', line: {color: '#51cf66'}, yaxis: 'y4' },
            { x: x, y: ma21, name: 'MA21', line: {color: '#fcc419'}, yaxis: 'y4' },
            { x: x, y: wick_y, type: 'bar', name: '% Wick', marker: {color: wick_colors}, yaxis: 'y5' }
        ], layout);

        document.getElementById('rangeButtons').style.display = 'flex';
        document.querySelectorAll('.y-control-panel').forEach(p => p.style.display = 'flex');
    }

    function renderSummaryTable(rawData) {
        const latest20 = rawData.slice(0, 20); 
        const tableBody = document.getElementById('tableBody');
        tableBody.innerHTML = '';

        latest20.forEach((row, index) => {
            const cs = parseFloat(row['Candle Size'] || 0);
            const csClass = cs > 0 ? 'txt-green' : (cs < 0 ? 'txt-red' : '');
            const wSide = row['Wick Side'];
            const wickClass = wSide === 'Top' ? 'txt-green' : (wSide === 'Bottom' ? 'txt-red' : '');

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${index + 1}</td>
                <td class="${csClass}">${parseFloat(row.Close).toLocaleString(undefined, {minimumFractionDigits: 2})}</td>
                <td class="${csClass}">${parseFloat(row.Volume).toLocaleString()}</td>
                <td class="${csClass}">${cs.toFixed(2)}</td>
                <td class="${wickClass}">${row['% Wick'] || '0%'}</td>
                <td>${row.MA7 ? parseFloat(row.MA7).toFixed(2) : '-'}</td>
                <td>${row.MA14 ? parseFloat(row.MA14).toFixed(2) : '-'}</td>
                <td>${row.MA21 ? parseFloat(row.MA21).toFixed(2) : '-'}</td>
            `;
            tableBody.appendChild(tr);
        });
        document.getElementById('tableSection').style.display = 'block';
    }

    function saveAsHTML() {
        const htmlContent = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;
        const blob = new Blob([htmlContent], { type: 'text/html' });
        const a = document.createElement('a');
        const timestamp = new Date().toISOString().slice(0,16).replace(/[:T]/g, '-');
        a.href = URL.createObjectURL(blob);
        a.download = `trading-report-${timestamp}.html`;
        a.click();
    }

    let yAxisTimers = {};
    function applyY(axisName, minId, maxId) {
        clearTimeout(yAxisTimers[axisName]);
        yAxisTimers[axisName] = setTimeout(() => {
            let min = document.getElementById(minId).value;
            let max = document.getElementById(maxId).value;
            if (min !== "" && max !== "") {
                let update = {};
                update[axisName + '.range'] = [parseFloat(min), parseFloat(max)];
                update[axisName + '.autorange'] = false;
                Plotly.relayout('chart', update);
            }
        }, 400);
    }

    function resetY(axisName, minId, maxId) {
        document.getElementById(minId).value = "";
        document.getElementById(maxId).value = "";
        let update = {}; update[axisName + '.autorange'] = true;
        Plotly.relayout('chart', update);
    }

    function setZoom(rangeType, btnElement) {
        document.querySelectorAll('.btn-group button').forEach(b => b.classList.remove('active'));
        if(btnElement) btnElement.classList.add('active');

        if (globalRawDates.length === 0) return;

        let endIdx = globalRawDates.length - 1;
        
        if (rangeType === 'all') {
            Plotly.relayout('chart', { 'xaxis.autorange': true });
            return;
        }

        let startIdx = 0;

        if (rangeType === '75c') {
            startIdx = Math.max(0, globalRawDates.length - 75);
        } else {
            // ใช้เวลาดิบในการคำนวณย้อนหลัง เพื่อไม่ให้ error
            let endStr = globalRawDates[endIdx];
            let endDate = new Date(endStr.replace(' ', 'T')); 
            let startDate = new Date(endDate);

            if (rangeType === '1d') startDate.setDate(endDate.getDate() - 1);
            else if (rangeType === '1w') startDate.setDate(endDate.getDate() - 7);
            else if (rangeType === '4w') startDate.setDate(endDate.getDate() - 28);
            else if (rangeType === '3m') startDate.setMonth(endDate.getMonth() - 3);
            else if (rangeType === '6m') startDate.setMonth(endDate.getMonth() - 6);
            else if (rangeType === '1y') startDate.setFullYear(endDate.getFullYear() - 1);

            let targetTime = startDate.getTime();
            
            startIdx = globalRawDates.findIndex(d => new Date(d.replace(' ', 'T')).getTime() >= targetTime);
            if (startIdx === -1) startIdx = 0;
        }

        Plotly.relayout('chart', {
            'xaxis.range': [startIdx - 0.5, endIdx + 0.5]
        });
    }
</script>

</body>
</html>
